<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRASESS.DESIGN.STUDIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"
        integrity="sha512-1cK78a1o+ht2JcaW6g8OXYwqpev9+6GqOkz9xmBN9iUUhIndKtxwILGWYOSibOKjLsEdjyjZvYDq/cZwNeak0w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.cdnfonts.com/css/neutral-face" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/media.css">
</head>

<body>

    <section class="general">
        <div class="general__background" data-aos="fade-down" data-aos-duration="3000">
            <img class="background-img" src="img/images/green-background-general.png" alt="background-image">
        </div>
        <div class="container">
            <div class="general__logo" data-aos="zoom-in" data-aos-duration="3000">
                <a href="#" class="logo"><img src="img/logo/logotype.png" alt="logotype"></a>
            </div>
            <div class="general__image-bear">
                <img src="img/images/general-image-bear.png" alt="bear__image" data-aos="zoom-in"
                    data-aos-duration="3000">
                <div class="general__text" data-aos="fade-up-right" data-aos-duration="3000">
                    <h1 class="general__text-title">Ми генератори <span>Незвичайних</span> Рішень!</h1>
                </div>
            </div>
        </div>
    </section>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"
        integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/smoothscroll/1.4.10/SmoothScroll.min.js"
        integrity="sha256-huW7yWl7tNfP7lGk46XE+Sp0nCotjzYodhVKlwaNeco=" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>

</html>
